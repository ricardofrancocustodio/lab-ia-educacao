<!DOCTYPE html>
<html lang="pt-BR">
<head id="component-head">
  <title>Assistente Publico | Fila de Atendimento Humano</title>
  <style>
    body { opacity: 0; transition: opacity .3s ease; }
    .hq-hero { background: linear-gradient(135deg, #f0fff4 0%, #ffffff 100%); border: 1px solid #c3e6cb; border-radius: 16px; padding: 20px; margin-bottom: 1rem; }
    .hq-card { background: #fff; border: 1px solid #e6edf5; border-radius: 14px; padding: 16px; margin-bottom: 12px; transition: box-shadow .2s; cursor: pointer; }
    .hq-card:hover { box-shadow: 0 4px 14px rgba(20,43,73,.08); }
    .hq-st-waiting_human { border-left: 4px solid #dc3545; }
    .hq-st-open { border-left: 4px solid #ffc107; }
    .hq-st-in_progress { border-left: 4px solid #17a2b8; }
    .hq-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .badge-hq-waiting_human { background: #dc3545; color: #fff; }
    .badge-hq-open { background: #ffc107; color: #212529; }
    .badge-hq-in_progress { background: #17a2b8; color: #fff; }
    .hq-meta { color: #6c757d; font-size: .84rem; }
    .hq-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .hq-empty { border: 1px dashed #c7d2e2; border-radius: 12px; padding: 32px; color: #6c757d; background: #f8fbff; text-align: center; }
    .stat-card { background: #fff; border: 1px solid #e6edf5; border-radius: 14px; padding: 16px; text-align: center; }
    .stat-card .stat-value { font-size: 1.6rem; font-weight: 700; line-height: 1.2; }
    .stat-card .stat-label { font-size: .82rem; color: #6c757d; margin-top: 4px; }
    .hq-wait-urgent { color: #dc3545; font-weight: 600; }
    .hq-wait-warning { color: #fd7e14; font-weight: 600; }
    .hq-wait-normal { color: #6c757d; }
  </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed" data-page="handoff-queue">
  <div class="wrapper">
    <div id="component-header"></div>
    <div id="component-sidebar"></div>
    <div class="content-wrapper">
      <section class="content-header pb-0">
        <div class="container-fluid">
          <div class="hq-hero">
            <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center">
              <div>
                <h1 class="m-0"><i class="fas fa-headset mr-2 text-success"></i>Fila de Atendimento Humano</h1>
                <p class="text-muted mb-0 mt-2">Conversas que a IA encaminhou para atendimento humano — priorizadas por tempo de espera.</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="content">
        <div class="container-fluid">
          <div class="text-center py-4" id="hq-loading">
            <div class="spinner-border text-success"></div>
            <p class="mt-2 mb-0">Carregando fila...</p>
          </div>

          <div id="hq-root" style="display:none;">
            <!-- Stats row -->
            <div class="row mb-3" id="hq-stats-row">
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-danger" id="stat-waiting">-</div><div class="stat-label">Aguardando Humano</div></div></div>
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-warning" id="stat-open">-</div><div class="stat-label">Abertas</div></div></div>
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-info" id="stat-in-progress">-</div><div class="stat-label">Em Andamento</div></div></div>
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-success" id="stat-resolved-today">-</div><div class="stat-label">Resolvidas Hoje</div></div></div>
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-secondary" id="stat-avg-wait">-</div><div class="stat-label">Espera Media (min)</div></div></div>
            </div>

            <!-- Filters -->
            <div class="hq-toolbar">
              <select class="form-control form-control-sm" id="filter-status" style="width:200px;">
                <option value="WAITING_HUMAN">Aguardando Humano</option>
                <option value="">Todos os status</option>
                <option value="OPEN">Abertas</option>
                <option value="IN_PROGRESS">Em Andamento</option>
              </select>
              <span class="ml-auto hq-meta" id="hq-count-label"></span>
            </div>

            <!-- List container -->
            <div id="hq-list"></div>
          </div>
        </div>
      </section>
    </div>

    <div id="component-footer"></div>
  </div>

  <!-- Modal: Queue Item Detail -->
  <div class="modal fade" id="hqDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-headset mr-2"></i>Detalhes da Conversa</h5>
          <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
        </div>
        <div class="modal-body" id="hqDetailBody">
          <div class="text-center py-3"><div class="spinner-border text-success"></div></div>
        </div>
        <div class="modal-footer" id="hqDetailFooter">
          <button class="btn btn-secondary" data-dismiss="modal">Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabaseConfig.js"></script>
  <script src="./js/school-switcher.js"></script>
  <script src="./js/session.js"></script>
  <script src="./js/coordinator/carregar-componentes.js"></script>
  <script src="./js/permissions.js"></script>
  <script src="./js/handoff-queue/handoff-queue-panel.js?v=20260328a"></script>
</body>
</html>
