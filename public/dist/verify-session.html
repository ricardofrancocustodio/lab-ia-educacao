<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Assistente Publico | Sincronizando Conta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
</head>
<body class="hold-transition login-page">
    <div class="text-center">
        <div id="loader" class="spinner-border text-primary" role="status"></div>
        <h4 class="mt-3" id="status-title">Finalizando sua ativação...</h4>
        <p class="text-muted" id="status-desc">Vinculando sua conta à escola selecionada.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabaseConfig.js"></script>

    <script>
        // Substitua a parte do update no seu verify-session.html por esta:
async function forcarSincronizacao() {
    try {
        const { data: { session } } = await window.supabaseClient.auth.getSession();
        if (!session) return window.location.href = '/';

        const userUUID = session.user.id;
        const userEmail = session.user.email.toLowerCase().trim();

        // 1. Buscamos a linha primeiro para ter certeza que ela existe
        const { data: membro, error: fetchError } = await window.supabaseClient
            .from('school_members')
            .select('*')
            .ilike('email', userEmail)
            .maybeSingle();

        if (fetchError || !membro) {
            console.error("Membro não localizado no banco para o email:", userEmail);
            document.getElementById('status-title').innerText = "Convite não localizado";
            return;
        }

        // 2. Agora que temos a ID exata da linha (id primário), fazemos o update
        const { error: updateError } = await window.supabaseClient
            .from('school_members')
            .update({ 
                user_id: userUUID,
                status: 'active',
                active: true 
            })
            .eq('id', membro.id); // Usamos o ID primário (UUID da tabela)

        if (updateError) throw updateError;

        window.location.href = '/dist/dashboard.html';

    } catch (err) {
        console.error("Erro:", err);
    }
}
        window.onload = forcarSincronizacao;
    </script>
</body>
</html>
