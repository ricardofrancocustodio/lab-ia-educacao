<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Assistente Publico | Ativar Conta</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d6efd, #6610f2);
      font-family: 'Inter', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .card {
      background: #fff;
      width: 420px;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 15px 40px rgba(0,0,0,.2);
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #0d6efd;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 12px;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: #0d6efd;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      background: #0d6efd;
      color: #fff;
      cursor: pointer;
      transition: .2s;
    }

    button:disabled {
      background: #adb5bd;
      cursor: not-allowed;
    }

    .rules {
      text-align: left;
      margin: 15px 0;
      font-size: 14px;
    }

    .rule {
      margin-bottom: 6px;
      color: #999;
    }

    .rule.ok {
      color: #198754;
    }

    .error {
      color: #dc3545;
      margin-top: 10px;
    }

    .success {
      color: #198754;
    }

    .loader {
      font-size: 18px;
      color: #fff;
    }
  </style>
</head>

<body>

<div id="app" class="card">

  <div v-if="loading">
    <div class="loader">
      <i class="fas fa-spinner fa-spin"></i><br>
      Validando convite...
    </div>
  </div>

  <div v-if="error" class="error">
    <h3>âŒ Erro</h3>
    <p>{{ error }}</p>
    <a href="/" style="color:#0d6efd;">Voltar ao login</a>
  </div>

  <div v-if="showPasswordForm">
    <div class="logo">ASSISTENTE PUBLICO</div>
    <div class="subtitle">OlÃ¡, {{ userName }} ðŸ‘‹<br>Crie sua senha para ativar a conta</div>

    <input type="password" v-model="password" placeholder="Nova senha">
    <input type="password" v-model="confirmPassword" placeholder="Confirmar senha">

    <!-- Regras -->
    <div class="rules">
      <div :class="['rule', rules.min ? 'ok' : '']">âœ” MÃ­nimo 8 caracteres</div>
      <div :class="['rule', rules.upper ? 'ok' : '']">âœ” Letra maiÃºscula</div>
      <div :class="['rule', rules.lower ? 'ok' : '']">âœ” Letra minÃºscula</div>
      <div :class="['rule', rules.number ? 'ok' : '']">âœ” NÃºmero</div>
      <div :class="['rule', rules.special ? 'ok' : '']">âœ” Caractere especial</div>
    </div>

    <button :disabled="!passwordValida || saving" @click="setPassword">
      <span v-if="!saving">Ativar Conta</span>
      <span v-else><i class="fas fa-spinner fa-spin"></i> Salvando...</span>
    </button>
  </div>

  <div v-if="success" class="success">
    <h3>âœ… Conta ativada!</h3>
    <p>Redirecionando para o dashboard...</p>
  </div>
</div>


<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const supabase = createClient(
    'https://daervzofihzytmvynkpi.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhZXJ2em9maWh6eXRtdnlua3BpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTIyMDYsImV4cCI6MjA4OTI2ODIwNn0.raA68qFf0Pnj2kzNXCOfKEAdNKwSkW166QDrgpzhts4'
  )

  const { createApp, ref, watch, computed } = Vue

  createApp({
    setup() {
      const loading = ref(true)
      const error = ref(null)
      const showPasswordForm = ref(false)
      const success = ref(false)
      const saving = ref(false)
      const userName = ref('')
      const password = ref('')
      const confirmPassword = ref('')

      const rules = ref({
        min: false,
        upper: false,
        lower: false,
        number: false,
        special: false
      })

      watch(password, (val) => {
        rules.value.min = val.length >= 8
        rules.value.upper = /[A-Z]/.test(val)
        rules.value.lower = /[a-z]/.test(val)
        rules.value.number = /[0-9]/.test(val)
        rules.value.special = /[^A-Za-z0-9]/.test(val)
        })

        const passwordValida = computed(() =>
        Object.values(rules.value).every(v => v)
        )

      // FunÃ§Ã£o para extrair hash da URL
      function getHashParams() {
        const hash = window.location.hash.substring(1)
        const params = {}
        hash.split('&').forEach(pair => {
          const [key, value] = pair.split('=')
          params[key] = decodeURIComponent(value)
        })
        return params
      }

      // InicializaÃ§Ã£o
      async function init() {
      try {
        loading.value = true;
        console.log('Validando link de convite...');

        // 1. O SDK do Supabase captura automaticamente o token do hash (#) 
        // e cria a sessÃ£o assim que a pÃ¡gina carrega.
        // Basta pedir a sessÃ£o atual.
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();

        if (sessionError) throw sessionError;

        // 2. Se houver uma sessÃ£o, significa que o token era vÃ¡lido!
        if (session) {
          const metadata = session.user.user_metadata;
          console.log('âœ… SessÃ£o validada para:', session.user.email);
          const schoolIdRecuperado = metadata?.school_id;
          userName.value = session.user.user_metadata?.full_name || "UsuÃ¡rio";
          
          console.log('ðŸ« Escola identificada:', schoolIdRecuperado);
          
          // InteligÃªncia: Vincula o UUID ao banco se necessÃ¡rio
          await atualizarMembroNoBanco(session.user);
          
          showPasswordForm.value = true;
        } else {
          // Se nÃ£o houver sessÃ£o, o link pode ter expirado ou o hash foi removido
          throw new Error('Link de convite invÃ¡lido ou jÃ¡ utilizado.');
        }

      } catch (err) {
          console.error('âŒ Erro na validaÃ§Ã£o:', err);
            error.value = err.message;
          } finally {
            loading.value = false;
          }
    }

      async function atualizarMembroNoBanco(user) {
        try {
          // Agora que temos o UUID (user.id), preenchemos o campo que estava null
          const { error: dbError } = await supabase
            .from('school_members')
            .update({ user_id: user.id })
            .eq('email', user.email)
            .is('user_id', null); // SÃ³ atualiza se ainda nÃ£o tiver ID

          if (dbError) console.warn('Aviso ao vincular ID:', dbError.message);
        } catch (e) {
          console.error('Erro ao atualizar UUID:', e);
        }
      }

// Nova funÃ§Ã£o para garantir que o UUID do Auth preencha o school_members
async function vincularUsuarioAoBanco(user, schoolIdRecuperado) {
  try {
    // Fazemos o update na tabela school_members usando o e-mail como chave
    // para preencher o user_id (UUID) que agora temos na sessÃ£o
    const { error: updateDbError } = await supabase
      .from('school_members')
      .update({ 
        user_id: user.id,
        school_id: schoolIdRecuperado,
        status: 'active' // JÃ¡ marcamos como ativo no processo
      })
      .eq('email', user.email)
      .is('user_id', null); // SÃ³ atualiza se ainda estiver null

    if (updateDbError) console.warn('Aviso ao vincular UUID:', updateDbError.message);
  } catch (e) {
    console.error('Falha ao vincular usuÃ¡rio no banco:', e);
  }
}

      // FunÃ§Ã£o para definir senha
async function setPassword() {
  if (password.value !== confirmPassword.value) {
    return Swal.fire('Erro', 'As senhas nÃ£o coincidem!', 'error');
  }

  saving.value = true;
  try {
    // 1. Atualiza a senha no Supabase Auth
    const { error: updateError } = await supabase.auth.updateUser({
      password: password.value
    });

    if (updateError) throw updateError;

    // âœ… TRUQUE DE SEGURANÃ‡A: Pegamos a sessÃ£o fresca direto do storage
    // Isso garante que temos o UUID (user.id) atualizado.
    const { data: { session } } = await supabase.auth.getSession();
    const currentUser = session?.user;

    if (!currentUser) {
        throw new Error("SessÃ£o perdida apÃ³s atualizar senha. Tente fazer login.");
    }

    // 2. RECUPERAÃ‡ÃƒO DE METADADOS
    const schoolIdConvite = currentUser.user_metadata?.school_id;
    const userUUID = currentUser.id; // O UUID que vocÃª precisa!

    console.log("ðŸ”— Vinculando UUID:", userUUID, "Ã  escola:", schoolIdConvite);

    // 3. VÃNCULO NO BANCO
    // ForÃ§amos o email para minÃºsculo para evitar erros de comparaÃ§Ã£o
    const userEmail = currentUser.email.toLowerCase();

    const { error: dbError } = await supabase
      .from('school_members')
      .update({ 
        user_id: userUUID,   // Agora garantido!
        status: 'active',
        active: true,
        school_id: schoolIdConvite 
      })
      .ilike('email', userEmail); // ilike ignora maiÃºsculas/minÃºsculas

    if (dbError) throw dbError;

    success.value = true;

    // 4. Redirecionamento
    setTimeout(() => {
      window.location.href = '/verificar-sessao';
    }, 2000);

  } catch (err) {
    console.error('âŒ Erro crÃ­tico no vÃ­nculo:', err);
    Swal.fire('Falha na AtivaÃ§Ã£o', err.message, 'error');
  } finally {
    saving.value = false;
  }
}

      // Inicia quando a pÃ¡gina carrega
      init()

      return {
        loading,
        error,
        showPasswordForm,
        success,
        saving,
        userName,
        password,
        confirmPassword,
        rules,
        passwordValida,
        setPassword
      }
    }
  }).mount('#app')
</script>
</body>
</html>
