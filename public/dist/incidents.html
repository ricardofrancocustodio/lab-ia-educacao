<!DOCTYPE html>
<html lang="pt-BR">
<head id="component-head">
  <title>Assistente Publico | Painel de Incidentes</title>
  <style>
    body { opacity: 0; transition: opacity .3s ease; }
    .incident-hero { background: linear-gradient(135deg, #fff8f0 0%, #ffffff 100%); border: 1px solid #f0dcc7; border-radius: 16px; padding: 20px; margin-bottom: 1rem; }
    .incident-card { background: #fff; border: 1px solid #e6edf5; border-radius: 14px; padding: 16px; margin-bottom: 12px; transition: box-shadow .2s; cursor: pointer; }
    .incident-card:hover { box-shadow: 0 4px 14px rgba(20,43,73,.08); }
    .incident-sev-critical { border-left: 4px solid #dc3545; }
    .incident-sev-high { border-left: 4px solid #fd7e14; }
    .incident-sev-medium { border-left: 4px solid #ffc107; }
    .incident-sev-low { border-left: 4px solid #6c757d; }
    .incident-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .badge-sev-critical { background: #dc3545; color: #fff; }
    .badge-sev-high { background: #fd7e14; color: #fff; }
    .badge-sev-medium { background: #ffc107; color: #212529; }
    .badge-sev-low { background: #6c757d; color: #fff; }
    .badge-st-open { background: #0d6efd; color: #fff; }
    .badge-st-in_review { background: #6f42c1; color: #fff; }
    .badge-st-resolved { background: #198754; color: #fff; }
    .badge-st-dismissed { background: #adb5bd; color: #212529; }
    .incident-meta { color: #6c757d; font-size: .84rem; }
    .incident-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .incident-empty { border: 1px dashed #c7d2e2; border-radius: 12px; padding: 32px; color: #6c757d; background: #f8fbff; text-align: center; }
    .stat-card { background: #fff; border: 1px solid #e6edf5; border-radius: 14px; padding: 16px; text-align: center; }
    .stat-card .stat-value { font-size: 1.6rem; font-weight: 700; line-height: 1.2; }
    .stat-card .stat-label { font-size: .82rem; color: #6c757d; margin-top: 4px; }
  </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed" data-page="incidents">
  <div class="wrapper">
    <div id="component-header"></div>
    <div id="component-sidebar"></div>
    <div class="content-wrapper">
      <section class="content-header pb-0">
        <div class="container-fluid">
          <div class="incident-hero">
            <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center">
              <div>
                <h1 class="m-0"><i class="fas fa-exclamation-triangle mr-2 text-warning"></i>Painel de Incidentes</h1>
                <p class="text-muted mb-0 mt-2">Monitoramento e gestao de incidentes de IA — respostas inadequadas, violacoes, falhas e escalonamentos.</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="content">
        <div class="container-fluid">
          <!-- Loading -->
          <div class="text-center py-4" id="incidents-loading">
            <div class="spinner-border text-warning"></div>
            <p class="mt-2 mb-0">Carregando incidentes...</p>
          </div>

          <!-- Main content -->
          <div id="incidents-root" style="display:none;">
            <!-- Stats row -->
            <div class="row mb-3" id="incidents-stats-row">
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-primary" id="stat-open">-</div><div class="stat-label">Abertos</div></div></div>
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-purple" id="stat-review">-</div><div class="stat-label">Em Revisao</div></div></div>
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-danger" id="stat-critical">-</div><div class="stat-label">Criticos Abertos</div></div></div>
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-success" id="stat-resolved">-</div><div class="stat-label">Resolvidos</div></div></div>
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-info" id="stat-avg-hours">-</div><div class="stat-label">Horas (media)</div></div></div>
            </div>

            <!-- Filters -->
            <div class="incident-toolbar">
              <select class="form-control form-control-sm" id="filter-status" style="width:170px;">
                <option value="">Todos os status</option>
                <option value="OPEN">Aberto</option>
                <option value="IN_REVIEW">Em Revisao</option>
                <option value="RESOLVED">Resolvido</option>
                <option value="DISMISSED">Descartado</option>
              </select>
              <select class="form-control form-control-sm" id="filter-severity" style="width:170px;">
                <option value="">Todas as severidades</option>
                <option value="CRITICAL">Critica</option>
                <option value="HIGH">Alta</option>
                <option value="MEDIUM">Media</option>
                <option value="LOW">Baixa</option>
              </select>
              <span class="ml-auto incident-meta" id="incident-count-label"></span>
            </div>

            <!-- List container -->
            <div id="incidents-list"></div>
          </div>
        </div>
      </section>
    </div>

    <div id="component-footer"></div>
  </div>

  <!-- Modal: Incident Detail -->
  <div class="modal fade" id="incidentDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="incidentDetailTitle">Detalhes do Incidente</h5>
          <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
        </div>
        <div class="modal-body" id="incidentDetailBody"></div>
        <div class="modal-footer" id="incidentDetailFooter" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabaseConfig.js"></script>
  <script src="./js/session.js"></script>
  <script src="./js/coordinator/carregar-componentes.js"></script>
  <script src="./js/permissions.js"></script>
  <script src="./js/incidents/incidents-panel.js"></script>
</body>
</html>
