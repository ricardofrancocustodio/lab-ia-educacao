<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Assistente Publico | Recuperar Senha</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/adminlte.css" />

  <style>
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: 'Source Sans 3', sans-serif;
      background: #f4f6f9;
    }

    .login-wrapper {
      display: flex;
      min-height: 100vh;
    }

    .login-left {
      flex: 1;
      background: linear-gradient(135deg, #0d6efd, #6610f2);
      color: #fff;
      padding: 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-left h1 {
      font-size: 2.6rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .login-left p {
      font-size: 1.2rem;
      max-width: 480px;
      opacity: 0.9;
    }

    .login-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }

    .login-box {
      width: 450px;
      max-width: 90%;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo h2 {
      font-weight: 800;
      color: #0d6efd;
      font-size: 2.4rem;
      margin: 0;
    }

    .login-box-msg {
      font-weight: 600;
      font-size: 1.1rem;
      color: #495057;
      margin-bottom: 2rem;
      text-align: center;
    }

    .input-group {
      display: flex;
      flex-wrap: nowrap;
    }

    .form-control {
      width: 1% !important;
      flex: 1 1 auto;
      height: 55px;
      font-size: 1.1rem;
      border-radius: 8px 0 0 8px;
      border-right: none;
      background-color: #f8f9fa;
    }

    .input-group-text {
      width: 55px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f8f9fa;
      border-radius: 0 8px 8px 0;
      border: 1px solid #ced4da;
      border-left: none;
      font-size: 1.2rem;
      color: #6c757d;
    }

    .btn-primary {
      height: 55px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 8px;
      background: #0d6efd;
      border: none;
    }

    .btn-primary:disabled {
      background: #adb5bd;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-weight: 600;
      color: #0d6efd;
      text-decoration: none;
    }

    @media (max-width: 991px) {
      .login-wrapper { flex-direction: column; }
      .login-left { text-align: center; padding: 3rem 2rem; }
    }
  </style>
</head>

<body>

<div class="login-wrapper">

  <div class="login-left">
    <h1>Recupere seu acesso.</h1>
    <p>
      Informe seu e-mail corporativo e enviaremos um link seguro
      para redefinir sua senha.
    </p>
  </div>

  <div class="login-right">
    <div class="login-box">

      <div class="login-logo">
        <h2><span style="color:#333">Assistente</span> Publico</h2>
      </div>

      <p class="login-box-msg">
        🔐 Recuperação de Senha
      </p>

      <form id="forgotForm">

        <div class="input-group mb-4">
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="Seu e-mail corporativo"
            required
          />
          <div class="input-group-text">
            <i class="bi bi-envelope"></i>
          </div>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary" id="btn-reset">
            Enviar link de recuperação
          </button>
        </div>

        <div
          id="msg"
          class="alert mt-3 text-center"
          style="display:none; border-radius:8px;"
        ></div>
      </form>

      <a href="/" class="back-link">
        ← Voltar para o login
      </a>

    </div>
  </div>

</div>

<!-- 🔥 SUPABASE ISOLADO (SEM supabaseConfig.js) -->
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const supabase = createClient(
    'https://daervzofihzytmvynkpi.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhZXJ2em9maWh6eXRtdnlua3BpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTIyMDYsImV4cCI6MjA4OTI2ODIwNn0.raA68qFf0Pnj2kzNXCOfKEAdNKwSkW166QDrgpzhts4'
  )

  const form = document.getElementById('forgotForm')
  const btn = document.getElementById('btn-reset')
  const msg = document.getElementById('msg')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()

    const email = document.getElementById('email').value

    btn.disabled = true
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Enviando...'
    msg.style.display = 'none'

    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/dist/reset-password.html'
    })

    if (error) {
      console.error(error)
      msg.className = 'alert alert-danger mt-3 text-center'
      msg.innerHTML = 'Erro ao enviar o e-mail de recuperação.'
      msg.style.display = 'block'
    } else {
      msg.className = 'alert alert-success mt-3 text-center'
      msg.innerHTML = '📨 Se o e-mail existir, enviaremos um link de recuperação.'
      msg.style.display = 'block'
    }

    btn.disabled = false
    btn.innerHTML = 'Enviar link de recuperação'
  })
</script>

</body>
</html>
