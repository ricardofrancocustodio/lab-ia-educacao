<!DOCTYPE html>
<html lang="pt-BR">
<head id="component-head">
  <title>Assistente Publico | Feedback da IA</title>
  <style>
    body { opacity: 0; transition: opacity .3s ease; }
    .feedback-hero { background: linear-gradient(135deg, #f0f4ff 0%, #ffffff 100%); border: 1px solid #d4dff0; border-radius: 16px; padding: 20px; margin-bottom: 1rem; }
    .feedback-card { background: #fff; border: 1px solid #e6edf5; border-radius: 14px; padding: 16px; margin-bottom: 12px; transition: box-shadow .2s; cursor: pointer; }
    .feedback-card:hover { box-shadow: 0 4px 14px rgba(20,43,73,.08); }
    .feedback-helpful { border-left: 4px solid #198754; }
    .feedback-not_helpful { border-left: 4px solid #fd7e14; }
    .feedback-incorrect { border-left: 4px solid #dc3545; }
    .fb-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .fb-badge-helpful { background: #198754; color: #fff; }
    .fb-badge-not_helpful { background: #fd7e14; color: #fff; }
    .fb-badge-incorrect { background: #dc3545; color: #fff; }
    .fb-badge-corrected { background: #0d6efd; color: #fff; }
    .fb-badge-pending { background: #ffc107; color: #212529; }
    .feedback-meta { color: #6c757d; font-size: .84rem; }
    .feedback-response-preview { color: #495057; margin-top: 8px; line-height: 1.5; font-size: .92rem; background: #f8f9fa; border-radius: 8px; padding: 10px 12px; border: 1px solid #e9ecef; }
    .feedback-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .feedback-empty { border: 1px dashed #c7d2e2; border-radius: 12px; padding: 32px; color: #6c757d; background: #f8fbff; text-align: center; }
    .stat-card { background: #fff; border: 1px solid #e6edf5; border-radius: 14px; padding: 16px; text-align: center; }
    .stat-card .stat-value { font-size: 1.6rem; font-weight: 700; line-height: 1.2; }
    .stat-card .stat-label { font-size: .82rem; color: #6c757d; margin-top: 4px; }
    .evidence-item { background: #f0f7ff; border: 1px solid #cce0f5; border-radius: 8px; padding: 10px 12px; margin-top: 6px; font-size: .88rem; }
    .evidence-item .ev-title { font-weight: 600; color: #0a58ca; }
    .evidence-item .ev-excerpt { color: #495057; margin-top: 4px; font-style: italic; }
    .text-purple { color: #6f42c1 !important; }
  </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed" data-page="feedback">
  <div class="wrapper">
    <div id="component-header"></div>
    <div id="component-sidebar"></div>
    <div class="content-wrapper">
      <section class="content-header pb-0">
        <div class="container-fluid">
          <div class="feedback-hero">
            <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center">
              <div>
                <h1 class="m-0"><i class="fas fa-comment-dots mr-2 text-info"></i>Feedback da IA</h1>
                <p class="text-muted mb-0 mt-2">Avaliacoes dos cidadaos sobre as respostas da IA — identifique respostas incorretas, insatisfacao e oportunidades de melhoria.</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="content">
        <div class="container-fluid">
          <!-- Loading -->
          <div class="text-center py-4" id="feedback-loading">
            <div class="spinner-border text-info"></div>
            <p class="mt-2 mb-0">Carregando feedbacks...</p>
          </div>

          <!-- Main content -->
          <div id="feedback-root" style="display:none;">
            <!-- Stats row -->
            <div class="row mb-3" id="feedback-stats-row">
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-success" id="stat-helpful">-</div><div class="stat-label">Positivos</div></div></div>
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-warning" id="stat-not-helpful">-</div><div class="stat-label">Nao Uteis</div></div></div>
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-danger" id="stat-incorrect">-</div><div class="stat-label">Incorretos</div></div></div>
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-primary" id="stat-positive-rate">-</div><div class="stat-label">Taxa Positiva</div></div></div>
              <div class="col-6 col-md-3 col-lg mb-2"><div class="stat-card"><div class="stat-value text-purple" id="stat-pending">-</div><div class="stat-label">Pendentes Correcao</div></div></div>
            </div>

            <!-- Filters -->
            <div class="feedback-toolbar">
              <select class="form-control form-control-sm" id="filter-type" style="width:180px;">
                <option value="">Todos os tipos</option>
                <option value="helpful">Positivo</option>
                <option value="not_helpful">Nao util</option>
                <option value="incorrect">Incorreto</option>
              </select>
              <label class="mb-0 ml-2" style="font-size:.88rem;">
                <input type="checkbox" id="filter-pending-only" class="mr-1"> Somente pendentes de correcao
              </label>
              <span class="ml-auto feedback-meta" id="feedback-count-label"></span>
            </div>

            <!-- List container -->
            <div id="feedback-list"></div>
          </div>
        </div>
      </section>
    </div>

    <div id="component-footer"></div>
  </div>

  <!-- Modal: Feedback Detail -->
  <div class="modal fade" id="feedbackDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="feedbackDetailTitle">Detalhes do Feedback</h5>
          <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
        </div>
        <div class="modal-body" id="feedbackDetailBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabaseConfig.js"></script>
  <script src="./js/session.js"></script>
  <script src="./js/coordinator/carregar-componentes.js"></script>
  <script src="./js/permissions.js"></script>
  <script src="./js/feedback/feedback-panel.js"></script>
</body>
</html>
