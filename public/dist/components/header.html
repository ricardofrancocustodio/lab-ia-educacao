<div class="modal fade" id="modalProfileHeader" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="fas fa-user-cog mr-2"></i>Meu Perfil</h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="d-flex align-items-center mb-3">
                    <span class="img-circle elevation-1 d-inline-flex align-items-center justify-content-center bg-info text-white mr-3" id="profile-modal-avatar" style="width:52px;height:52px;font-size:16px;font-weight:700;">US</span>
                    <div>
                        <div class="font-weight-bold" id="profile-modal-name">Usuário</div>
                        <small class="text-muted" id="profile-modal-role">Perfil</small>
                    </div>
                </div>

                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" class="form-control" id="profile-full-name" placeholder="Seu nome">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" class="form-control" id="profile-email" readonly>
                </div>

                <hr>
                <h6 class="mb-2">Alterar senha</h6>

                <div class="form-group mb-2">
                    <label>Nova senha</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="profile-new-password" minlength="8" placeholder="Mínimo 8 caracteres">
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary" type="button" id="profile-toggle-pass-1"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="progress mt-2" style="height:6px;">
                        <div class="progress-bar" id="profile-password-strength" style="width:0%"></div>
                    </div>
                    <small class="text-muted">Use letras maiúsculas, minúsculas, números e símbolo para uma senha forte.</small>
                </div>

                <div class="form-group mb-0">
                    <label>Confirmar nova senha</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="profile-confirm-password" minlength="8" placeholder="Repita a nova senha">
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary" type="button" id="profile-toggle-pass-2"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <small class="text-danger d-none" id="profile-password-error"></small>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-dismiss="modal">Fechar</button>
                <button class="btn btn-primary" id="profile-save-btn"><i class="fas fa-save mr-1"></i>Salvar perfil</button>
                <button class="btn btn-danger" id="profile-change-password-btn"><i class="fas fa-key mr-1"></i>Trocar senha</button>
            </div>
        </div>
    </div>
</div>
