<!DOCTYPE html>
<html lang="pt-br">
<head id="component-head">
  <title>Assistente Publico | Inteligencia</title>
  <style>
    body { opacity: 0; transition: opacity .3s ease; }
    .metric-card { min-height: 132px; }
    .assistant-bar { height: 10px; border-radius: 999px; background: #e9ecef; overflow: hidden; }
    .assistant-bar > span { display: block; height: 100%; background: linear-gradient(90deg, #0d6efd, #20c997); }
  </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed" data-page="dashboard">
  <div class="wrapper">
    <div id="component-header"></div>
    <div id="component-sidebar"></div>
    <div class="content-wrapper">
      <section class="content-header"><div class="container-fluid"><div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3"><div><h1 class="m-0">Dashboard de Inteligencia de Atendimento</h1><small class="text-muted" id="dashboard-period-label">Visao operacional de hoje</small></div><div class="d-flex align-items-center" style="gap:8px;"><label for="dashboard-period" class="mb-0 text-muted small">Periodo</label><select id="dashboard-period" class="form-control form-control-sm" style="width:180px;"><option value="today">Hoje</option><option value="7d">Ultimos 7 dias</option><option value="30d">Ultimos 30 dias</option><option value="all">Todo o periodo</option></select></div></div></div></section>
      <section class="content">
        <div class="container-fluid">
          <div class="row" id="metrics-row"></div>
          <div class="row">
            <div class="col-lg-7"><div class="card"><div class="card-header"><h3 class="card-title">Volume de Perguntas por Assistente</h3></div><div class="card-body" id="assistant-volume"></div></div></div>
            <div class="col-lg-5"><div class="card"><div class="card-header"><h3 class="card-title">Ultimos Eventos Auditados</h3></div><div class="card-body" id="latest-audit-events"></div></div></div>
          </div>
        </div>
      </section>
    </div>
    <div id="component-footer"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabaseConfig.js"></script>
  <script src="./js/session.js"></script>
  <script src="./js/components-loader.js"></script>
  <script src="./js/permissions.js"></script>
  <script src="./js/dashboard/intelligence.js"></script>
</body>
</html>
