<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Assistente Publico | Redefinir Senha</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/adminlte.css" />

  <style>
    body {
      margin: 0;
      font-family: 'Source Sans 3', sans-serif;
      background: linear-gradient(135deg, #0d6efd, #6610f2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      width: 420px;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 15px 40px rgba(0,0,0,.2);
      text-align: center;
    }

    h2 {
      font-weight: 800;
      color: #0d6efd;
      margin-bottom: 10px;
    }

    p {
      color: #6c757d;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      height: 52px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ced4da;
      padding: 0 15px;
      font-size: 1rem;
      background: #f8f9fa;
    }

    input:focus {
      outline: none;
      border-color: #0d6efd;
      background: #fff;
    }

    .rules {
      text-align: left;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .rule { color: #adb5bd; }
    .rule.ok { color: #198754; }

    button {
      width: 100%;
      height: 52px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      font-size: 1rem;
      background: #0d6efd;
      color: #fff;
    }

    button:disabled {
      background: #adb5bd;
    }

    .alert {
      margin-top: 15px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="card" id="app">

  <h2>Redefinir Senha</h2>
  <p>Crie uma nova senha para sua conta</p>

  <div v-if="loading">
    <p><i class="bi bi-arrow-repeat"></i> Validando link...</p>
  </div>

  <div v-if="error" class="alert alert-danger">
    {{ error }}
  </div>

  <div v-if="showForm">
    <input type="password" v-model="password" placeholder="Nova senha" />
    <input type="password" v-model="confirmPassword" placeholder="Confirmar senha" />

    <div class="rules">
      <div :class="['rule', rules.min && 'ok']">✔ Mínimo 8 caracteres</div>
      <div :class="['rule', rules.upper && 'ok']">✔ Letra maiúscula</div>
      <div :class="['rule', rules.lower && 'ok']">✔ Letra minúscula</div>
      <div :class="['rule', rules.number && 'ok']">✔ Número</div>
      <div :class="['rule', rules.special && 'ok']">✔ Caractere especial</div>
    </div>

    <button :disabled="!passwordValida || saving" @click="resetPassword">
      <span v-if="!saving">Salvar nova senha</span>
      <span v-else>Salvando...</span>
    </button>
  </div>

  <div v-if="success" class="alert alert-success">
    Senha redefinida com sucesso!  
    Redirecionando para o login...
  </div>

</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabaseConfig.js"></script>

<script>
const { createApp, ref, watch, computed } = Vue;

createApp({
  setup() {
    const loading = ref(true);
    const error = ref(null);
    const showForm = ref(false);
    const success = ref(false);
    const saving = ref(false);

    const password = ref('');
    const confirmPassword = ref('');

    const rules = ref({
      min: false,
      upper: false,
      lower: false,
      number: false,
      special: false
    });

    watch(password, (val) => {
      rules.value.min = val.length >= 8;
      rules.value.upper = /[A-Z]/.test(val);
      rules.value.lower = /[a-z]/.test(val);
      rules.value.number = /[0-9]/.test(val);
      rules.value.special = /[^A-Za-z0-9]/.test(val);
    });

    const passwordValida = computed(() =>
      Object.values(rules.value).every(Boolean)
    );

    async function init() {
      const { data: { session } } = await window.supabaseClient.auth.getSession();

      if (!session) {
        error.value = 'Link inválido ou expirado.';
      } else {
        showForm.value = true;
      }

      loading.value = false;
    }

    async function resetPassword() {
      if (password.value !== confirmPassword.value) {
        return error.value = 'As senhas não coincidem.';
      }

      saving.value = true;
      error.value = null;

      const { error: err } =
        await window.supabaseClient.auth.updateUser({
          password: password.value
        });

      if (err) {
        error.value = err.message;
      } else {
        success.value = true;
        setTimeout(() => {
          window.location.href = '/dist/login.html';
        }, 2000);
      }

      saving.value = false;
    }

    init();

    return {
      loading,
      error,
      showForm,
      success,
      saving,
      password,
      confirmPassword,
      rules,
      passwordValida,
      resetPassword
    };
  }
}).mount('#app');
</script>

</body>
</html>
