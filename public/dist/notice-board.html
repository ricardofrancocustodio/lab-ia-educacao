<!DOCTYPE html>
<html lang="pt-BR">
<head id="component-head">
  <title>Assistente Publico | Mural de Comunicados</title>
  <style>
    body { opacity: 0; transition: opacity .3s ease; }
    .notice-hero { background: linear-gradient(135deg, #f4f7fb 0%, #ffffff 100%); border: 1px solid #dfe7f1; border-radius: 16px; padding: 20px; margin-bottom: 1rem; }
    .notice-card { background: #fff; border: 1px solid #e6edf5; border-radius: 14px; padding: 16px; margin-bottom: 12px; transition: box-shadow .2s; }
    .notice-card:hover { box-shadow: 0 4px 14px rgba(20,43,73,.08); }
    .notice-priority-urgent { border-left: 4px solid #dc3545; }
    .notice-priority-high { border-left: 4px solid #fd7e14; }
    .notice-priority-normal { border-left: 4px solid #0d6efd; }
    .notice-badge-urgent { background: #dc3545; color: #fff; }
    .notice-badge-high { background: #fd7e14; color: #fff; }
    .notice-badge-normal { background: #0d6efd; color: #fff; }
    .notice-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .notice-type-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .72rem; font-weight: 500; }
    .notice-type-internal { background: #e8f4fd; color: #0a58ca; }
    .notice-type-external { background: #e8fde8; color: #0a7c0a; }
    .notice-meta { color: #6c757d; font-size: .84rem; }
    .notice-content-preview { color: #495057; margin-top: 8px; line-height: 1.5; }
    .notice-attachment { display: inline-flex; align-items: center; gap: 4px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 4px 10px; font-size: .82rem; color: #495057; margin-right: 6px; margin-top: 6px; }
    .notice-attachment i { color: #6c757d; }
    .notice-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .notice-empty { border: 1px dashed #c7d2e2; border-radius: 12px; padding: 32px; color: #6c757d; background: #f8fbff; text-align: center; }
    .notice-actions { display: flex; gap: 6px; margin-top: 10px; }
    .notice-expired { opacity: .55; }
  </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed" data-page="notices">
  <div class="wrapper">
    <div id="component-header"></div>
    <div id="component-sidebar"></div>
    <div class="content-wrapper">
      <section class="content-header pb-0">
        <div class="container-fluid">
          <div class="notice-hero">
            <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center">
              <div>
                <h1 class="m-0"><i class="fas fa-bullhorn mr-2 text-primary"></i>Mural de Comunicados</h1>
                <p class="text-muted mb-0 mt-2">Comunicados oficiais da escola e da rede — avisos, suspensoes, prazos e orientacoes internas.</p>
              </div>
              <div class="mt-3 mt-lg-0" id="notice-create-wrap" style="display:none;">
                <button class="btn btn-primary" id="btn-new-notice"><i class="fas fa-plus mr-1"></i> Novo Comunicado</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="content">
        <div class="container-fluid">
          <!-- Loading -->
          <div class="text-center py-4" id="notices-loading">
            <div class="spinner-border text-primary"></div>
            <p class="mt-2 mb-0">Carregando comunicados...</p>
          </div>

          <!-- Main content -->
          <div id="notices-root" style="display:none;">
            <!-- Filters -->
            <div class="notice-toolbar">
              <select class="form-control form-control-sm" id="filter-priority" style="width:160px;">
                <option value="">Todas as prioridades</option>
                <option value="urgent">Urgente</option>
                <option value="high">Alta</option>
                <option value="normal">Normal</option>
              </select>
              <select class="form-control form-control-sm" id="filter-type" style="width:160px;">
                <option value="">Todos os tipos</option>
                <option value="internal">Interno</option>
                <option value="external">Externo</option>
              </select>
              <label class="mb-0 ml-2" style="font-size:.88rem;">
                <input type="checkbox" id="filter-show-expired" class="mr-1"> Mostrar expirados
              </label>
            </div>

            <!-- List container -->
            <div id="notices-list"></div>
          </div>
        </div>
      </section>
    </div>

    <div id="component-footer"></div>
  </div>

  <!-- Modal: Create/Edit Notice -->
  <div class="modal fade" id="noticeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="noticeModalTitle">Novo Comunicado</h5>
          <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="notice-edit-id">
          <div class="form-group">
            <label for="notice-title">Titulo <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="notice-title" maxlength="300" placeholder="Titulo do comunicado">
          </div>
          <div class="form-group">
            <label for="notice-content">Conteudo <span class="text-danger">*</span></label>
            <textarea class="form-control" id="notice-content" rows="6" placeholder="Texto do comunicado..."></textarea>
          </div>
          <div class="row">
            <div class="col-md-4">
              <div class="form-group">
                <label for="notice-type">Tipo</label>
                <select class="form-control" id="notice-type">
                  <option value="internal">Interno</option>
                  <option value="external">Externo</option>
                </select>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-group">
                <label for="notice-priority">Prioridade</label>
                <select class="form-control" id="notice-priority">
                  <option value="normal">Normal</option>
                  <option value="high">Alta</option>
                  <option value="urgent">Urgente</option>
                </select>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-group">
                <label for="notice-expiry">Valido ate (opcional)</label>
                <input type="date" class="form-control" id="notice-expiry">
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-save-notice"><i class="fas fa-save mr-1"></i> Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: View Notice Detail -->
  <div class="modal fade" id="noticeDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="noticeDetailTitle">Comunicado</h5>
          <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
        </div>
        <div class="modal-body" id="noticeDetailBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabaseConfig.js"></script>
  <script src="./js/school-switcher.js"></script>
  <script src="./js/session.js"></script>
  <script src="./js/coordinator/carregar-componentes.js"></script>
  <script src="./js/permissions.js"></script>
  <script src="./js/notices/notice-board.js"></script>
</body>
</html>
