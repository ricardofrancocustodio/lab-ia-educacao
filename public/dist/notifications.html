<!DOCTYPE html>
<html lang="pt-BR">
<head id="component-head">
  <title>Assistente Publico | Notificacoes</title>
  <style>
    body { opacity: 0; transition: opacity .3s ease; }
    .notif-hero { background: linear-gradient(135deg, #f0f4ff 0%, #ffffff 100%); border: 1px solid #d4ddef; border-radius: 16px; padding: 20px; margin-bottom: 1rem; }
    .notif-card { background: #fff; border: 1px solid #e6edf5; border-radius: 14px; padding: 16px; margin-bottom: 12px; transition: box-shadow .2s; cursor: pointer; }
    .notif-card:hover { box-shadow: 0 4px 14px rgba(20,43,73,.08); }
    .notif-sent { border-left: 4px solid #198754; }
    .notif-pending { border-left: 4px solid #fd7e14; }
    .notif-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .badge-sent { background: #198754; color: #fff; }
    .badge-pending { background: #fd7e14; color: #fff; }
    .badge-manual { background: #6f42c1; color: #fff; }
    .notif-meta { color: #6c757d; font-size: .84rem; }
    .notif-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .notif-empty { border: 1px dashed #c7d2e2; border-radius: 12px; padding: 32px; color: #6c757d; background: #f8fbff; text-align: center; }
    .stat-card { background: #fff; border: 1px solid #e6edf5; border-radius: 14px; padding: 16px; text-align: center; }
    .stat-card .stat-value { font-size: 1.6rem; font-weight: 700; line-height: 1.2; }
    .stat-card .stat-label { font-size: .82rem; color: #6c757d; margin-top: 4px; }
    .notif-message-preview { background: #f7f9fc; border-radius: 8px; padding: 10px 12px; font-size: .88rem; margin-top: 8px; color: #333; }
  </style>
</head>
<body class="sidebar-mini layout-fixed layout-navbar-fixed" data-page="notifications">
  <div class="wrapper">
    <div id="component-header"></div>
    <div id="component-sidebar"></div>
    <div class="content-wrapper">
      <div class="content-header"><div class="container-fluid"></div></div>
      <section class="content">
        <div class="container-fluid">

          <div id="notif-loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Carregando notificacoes...</p>
          </div>

          <div id="notif-root" style="display:none;">
            <!-- Hero -->
            <div class="notif-hero d-flex align-items-center flex-wrap">
              <div class="mr-3"><i class="fas fa-bell fa-2x text-primary"></i></div>
              <div>
                <h4 class="mb-0 font-weight-bold">Gestao de Notificacoes</h4>
                <p class="mb-0 text-muted" style="font-size:.9rem;">Fila de envio, rastreamento de entregas e configuracoes por escola</p>
              </div>
            </div>

            <!-- Stats -->
            <div class="row mb-3">
              <div class="col-6 col-md-3 mb-2">
                <div class="stat-card"><div class="stat-value text-primary" id="stat-total">-</div><div class="stat-label">Total</div></div>
              </div>
              <div class="col-6 col-md-3 mb-2">
                <div class="stat-card"><div class="stat-value text-success" id="stat-sent">-</div><div class="stat-label">Enviadas</div></div>
              </div>
              <div class="col-6 col-md-3 mb-2">
                <div class="stat-card"><div class="stat-value text-warning" id="stat-pending">-</div><div class="stat-label">Pendentes</div></div>
              </div>
              <div class="col-6 col-md-3 mb-2">
                <div class="stat-card"><div class="stat-value text-info" id="stat-today">-</div><div class="stat-label">Hoje</div></div>
              </div>
            </div>

            <!-- Toolbar -->
            <div class="notif-toolbar">
              <select id="filter-sent" class="form-control form-control-sm" style="max-width:180px;">
                <option value="">Todos os status</option>
                <option value="false">Pendentes</option>
                <option value="true">Enviadas</option>
              </select>
              <button id="btn-new-notification" class="btn btn-sm btn-primary" style="display:none;">
                <i class="fas fa-paper-plane mr-1"></i>Nova Notificacao
              </button>
              <span class="notif-meta ml-auto" id="notif-count-label">0 notificacoes</span>
            </div>

            <!-- List -->
            <div id="notif-list"></div>
          </div>

        </div>
      </section>
    </div>
    <div id="component-footer"></div>
  </div>

  <!-- Detail Modal -->
  <div class="modal fade" id="notifDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="notifDetailTitle">Detalhe da Notificacao</h5>
          <button type="button" class="close" data-dismiss="modal">&times;</button>
        </div>
        <div class="modal-body" id="notifDetailBody"></div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-dismiss="modal">Fechar</button></div>
      </div>
    </div>
  </div>

  <!-- Send Modal -->
  <div class="modal fade" id="notifSendModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Nova Notificacao</h5>
          <button type="button" class="close" data-dismiss="modal">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="send-topic">Topico</label>
            <input type="text" class="form-control" id="send-topic" placeholder="Ex: Aviso urgente - matricula">
          </div>
          <div class="form-group">
            <label for="send-message">Mensagem</label>
            <textarea class="form-control" id="send-message" rows="4" placeholder="Texto da notificacao..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-confirm-send"><i class="fas fa-paper-plane mr-1"></i>Enviar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./js/supabaseConfig.js"></script>
  <script src="./js/school-switcher.js"></script>
  <script src="./js/session.js"></script>
  <script src="./js/coordinator/carregar-componentes.js"></script>
  <script src="./js/permissions.js"></script>
  <script src="./js/notifications/notifications-panel.js"></script>
</body>
</html>
