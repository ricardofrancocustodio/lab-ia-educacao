<!DOCTYPE html>
<html lang="pt-BR">
<head id="component-head">
  <title>Assistente Publico | Notificacoes</title>
  <style>
    body { opacity: 0; transition: opacity .3s ease; }
    .notif-page-header { background: linear-gradient(135deg, #f0f4ff 0%, #ffffff 100%); border: 1px solid #d4ddef; border-radius: 16px; padding: 20px 24px; margin-bottom: 1.2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .notif-page-header h4 { margin: 0; font-weight: 700; }
    .notif-page-header .notif-subtitle { font-size: .88rem; color: #6c757d; margin: 0; }

    /* Stats compactas */
    .notif-stats-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .notif-stat { background: #fff; border: 1px solid #e6edf5; border-radius: 12px; padding: 12px 18px; display: flex; align-items: center; gap: 10px; min-width: 140px; }
    .notif-stat .stat-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .9rem; }
    .notif-stat .stat-value { font-size: 1.3rem; font-weight: 700; line-height: 1; }
    .notif-stat .stat-label { font-size: .76rem; color: #6c757d; }

    /* Toolbar */
    .notif-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; padding: 12px 16px; background: #fff; border: 1px solid #e6edf5; border-radius: 12px; }

    /* Cards Jira-style */
    .notif-card { background: #fff; border: 1px solid #e6edf5; border-radius: 12px; padding: 14px 18px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; transition: box-shadow .2s, background .15s; }
    .notif-card:hover { box-shadow: 0 2px 12px rgba(20,43,73,.07); background: #f8fafe; }
    .notif-card.notif-unread { background: #f0f4ff; border-left: 3px solid #007bff; }
    .notif-card.notif-read { opacity: .8; }
    .notif-card .notif-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .notif-card .notif-body { flex: 1; min-width: 0; }
    .notif-card .notif-msg { font-size: .88rem; color: #343a40; line-height: 1.4; word-break: break-word; }
    .notif-card.notif-unread .notif-msg { font-weight: 600; }
    .notif-card .notif-meta { font-size: .76rem; color: #6c757d; margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
    .notif-card .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: #007bff; flex-shrink: 0; margin-top: 6px; }

    /* Grupo de data */
    .notif-group-header { font-size: .8rem; font-weight: 700; color: #6c757d; text-transform: uppercase; letter-spacing: .04em; margin: 20px 0 8px 4px; }

    /* Empty */
    .notif-empty { border: 1px dashed #c7d2e2; border-radius: 12px; padding: 48px 20px; color: #6c757d; background: #f8fbff; text-align: center; }

    /* Badges de topico */
    .notif-topic-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
  </style>
</head>
<body class="sidebar-mini layout-fixed layout-navbar-fixed" data-page="notifications">
  <div class="wrapper">
    <div id="component-header"></div>
    <div id="component-sidebar"></div>
    <div class="content-wrapper">
      <div class="content-header"><div class="container-fluid"></div></div>
      <section class="content">
        <div class="container-fluid">

          <div id="notif-loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Carregando notificacoes...</p>
          </div>

          <div id="notif-root" style="display:none;">
            <!-- Page Header -->
            <div class="notif-page-header">
              <div>
                <h4><i class="fas fa-bell mr-2 text-primary"></i>Notificacoes</h4>
                <p class="notif-subtitle">Acompanhe atualizacoes de incidentes, atribuicoes e atividades do sistema</p>
              </div>
              <div class="d-flex gap-2" style="gap:8px;">
                <button id="btn-mark-all-read" class="btn btn-sm btn-outline-primary" style="display:none;">
                  <i class="fas fa-check-double mr-1"></i>Marcar todas como lidas
                </button>
              </div>
            </div>

            <!-- Stats -->
            <div class="notif-stats-row">
              <div class="notif-stat">
                <div class="stat-icon" style="background:#e3f2fd;color:#1976d2;"><i class="fas fa-bell"></i></div>
                <div><div class="stat-value" id="stat-total">-</div><div class="stat-label">Total</div></div>
              </div>
              <div class="notif-stat">
                <div class="stat-icon" style="background:#e3f2fd;color:#007bff;"><i class="fas fa-envelope"></i></div>
                <div><div class="stat-value" id="stat-unread">-</div><div class="stat-label">Nao lidas</div></div>
              </div>
              <div class="notif-stat">
                <div class="stat-icon" style="background:#e8f5e9;color:#28a745;"><i class="fas fa-envelope-open"></i></div>
                <div><div class="stat-value" id="stat-read">-</div><div class="stat-label">Lidas</div></div>
              </div>
              <div class="notif-stat">
                <div class="stat-icon" style="background:#fff3e0;color:#ff9800;"><i class="fas fa-clock"></i></div>
                <div><div class="stat-value" id="stat-today">-</div><div class="stat-label">Hoje</div></div>
              </div>
            </div>

            <!-- Toolbar -->
            <div class="notif-toolbar">
              <select id="filter-read" class="form-control form-control-sm" style="max-width:160px;">
                <option value="">Todas</option>
                <option value="false">Nao lidas</option>
                <option value="true">Lidas</option>
              </select>
              <select id="filter-topic" class="form-control form-control-sm" style="max-width:200px;">
                <option value="">Todos os tipos</option>
                <option value="incident_resolved">Incidente Resolvido</option>
                <option value="incident_dismissed">Incidente Descartado</option>
                <option value="incident_in_review">Incidente em Revisao</option>
                <option value="incident_assigned">Incidente Atribuido</option>
                <option value="incident_opened">Incidente Aberto</option>
              </select>
              <span class="notif-meta ml-auto" id="notif-count-label" style="font-size:.84rem;color:#6c757d;">0 notificacoes</span>
            </div>

            <!-- List -->
            <div id="notif-list"></div>

            <!-- Load more -->
            <div id="notif-load-more" class="text-center py-3" style="display:none;">
              <button class="btn btn-sm btn-outline-secondary" id="btn-load-more">
                <i class="fas fa-arrow-down mr-1"></i>Carregar mais
              </button>
            </div>
          </div>

        </div>
      </section>
    </div>
    <div id="component-footer"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./js/supabaseConfig.js"></script>
  <script src="./js/school-switcher.js"></script>
  <script src="./js/session.js"></script>
  <script src="./js/coordinator/carregar-componentes.js"></script>
  <script src="./js/permissions.js"></script>
  <script src="./js/notifications/notifications-panel.js"></script>
</body>
</html>
