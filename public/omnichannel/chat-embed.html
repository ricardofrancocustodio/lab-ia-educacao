<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat da Escola</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', sans-serif; }
    .message-bubble { animation: fadeIn 0.18s ease-out; }
    .hub-card { transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease; }
    .hub-card:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08); }
    .presence-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
    }
    .typing-dots {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .typing-dots span {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #94a3b8;
      animation: bounceTyping 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounceTyping {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-4px); opacity: 1; }
    }
  </style>
</head>
<body class="h-screen bg-slate-50">
  <div class="h-full flex flex-col">
    <div class="px-4 py-3 border-b border-slate-200 bg-white">
      <div class="text-xs uppercase tracking-[0.18em] text-slate-400">Chat da Escola</div>
      <div class="flex items-center justify-between gap-3">
        <div>
          <div id="chat-school-name" class="text-lg font-bold text-slate-900">Atendimento virtual</div>
          <div class="mt-1 flex items-center gap-2 text-xs text-slate-500">
            <span class="presence-dot"></span>
            <span id="chat-presence-text">Online agora</span>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button id="chat-back-to-menu" type="button" class="hidden rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-semibold text-slate-600 hover:border-emerald-200 hover:text-emerald-700">
            Voltar ao menu
          </button>
          <div class="rounded-full bg-emerald-50 px-3 py-1 text-xs font-semibold text-emerald-700">
            IA da Escola
          </div>
        </div>
      </div>
    </div>

    <div id="chat-messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-3">
      <div class="message-bubble max-w-[88%] rounded-2xl rounded-tl-md bg-emerald-700 px-4 py-3 text-sm text-white shadow-sm">
        Ola. Sou a IA da escola. Posso ajudar com secretaria, tesouraria, direcao e informacoes institucionais.
      </div>
    </div>

    <div class="border-t border-slate-200 bg-white p-3">
      <form id="chat-form" class="flex items-end gap-2">
        <textarea id="chat-input" rows="1" class="max-h-32 min-h-[48px] flex-1 resize-none rounded-2xl border border-slate-300 px-4 py-3 text-sm outline-none focus:border-emerald-600" placeholder="Escreva sua mensagem..."></textarea>
        <button id="chat-send-btn" type="submit" class="rounded-2xl bg-emerald-700 px-4 py-3 text-sm font-semibold text-white hover:bg-emerald-800">
          Enviar
        </button>
      </form>
    </div>
  </div>

  <script>
    const state = {
      sessionId: '',
      schoolName: '',
      entrypoint: '',
      agentKey: '',
      agentTitle: '',
      agentSubtitle: '',
      agentSelected: false,
      hubEl: null,
      renderedMessageIds: new Set(),
      pollingTimer: null,
      awaitingHuman: false,
      typingEl: null
    };

    const AGENT_HUB_OPTIONS = {
      'administration.secretariat': {
        title: 'Secretaria',
        subtitle: 'Documentos, horarios e orientacoes administrativas.'
      },
      'administration.treasury': {
        title: 'Tesouraria',
        subtitle: 'Mensalidades, boletos e assuntos financeiros.'
      },
      'administration.direction': {
        title: 'Direcao',
        subtitle: 'Normas institucionais, diretrizes e assuntos da direcao.'
      },
      'public.assistant': {
        title: 'Assistente Publico',
        subtitle: 'Triagem inicial e encaminhamento institucional.'
      }
    };

    function byId(id) {
      return document.getElementById(id);
    }

    function getQuery() {
      const qs = new URLSearchParams(window.location.search);
      return {
        schoolName: String(qs.get('school_name') || 'Escola').trim(),
        entrypoint: String(qs.get('entrypoint') || 'main_interno').trim(),
        agentKey: String(qs.get('agent_key') || '').trim(),
        agentTitle: String(qs.get('agent_title') || '').trim(),
        agentSubtitle: String(qs.get('agent_subtitle') || '').trim()
      };
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getAgentPresentation() {
      if (state.agentTitle) {
        return {
          title: state.agentTitle,
          subtitle: state.agentSubtitle || `Atendimento especializado de ${state.schoolName}.`,
          greeting: `Ola. Sou o agente de ${state.agentTitle.toLowerCase()} da escola. Como posso ajudar?`
        };
      }

      return {
        title: 'Atendimento virtual',
        subtitle: `IA da ${state.schoolName}`,
        greeting: 'Ola. Sou a IA da escola. Posso ajudar com secretaria, financeiro, pedagogico e informacoes gerais.'
      };
    }

    function getHubIntroMessage() {
      return `Ola. Sou a IA da escola. Escolha abaixo o assistente institucional que deseja acionar.`;
    }

    function appendAssistantHtml(html) {
      const wrap = document.createElement('div');
      wrap.className = 'message-bubble max-w-[92%] rounded-2xl rounded-tl-md bg-white text-slate-800 border border-slate-200 shadow-sm';
      wrap.innerHTML = html;
      byId('chat-messages').appendChild(wrap);
      byId('chat-messages').scrollTop = byId('chat-messages').scrollHeight;
      return wrap;
    }

    function appendHubSelector() {
      if (state.hubEl && state.hubEl.parentNode) {
        state.hubEl.parentNode.removeChild(state.hubEl);
      }

      const optionsHtml = Object.entries(AGENT_HUB_OPTIONS).map(([agentKey, option], index) => `
        <button
          type="button"
          class="hub-card w-full rounded-2xl border border-slate-200 bg-slate-50 p-3 text-left"
          data-agent-key="${escapeHtml(agentKey)}"
          data-agent-title="${escapeHtml(option.title)}"
          data-agent-subtitle="${escapeHtml(option.subtitle)}"
        >
          <div class="text-xs font-bold uppercase tracking-[0.14em] text-slate-400">Opcao ${index + 1}</div>
          <div class="mt-1 text-sm font-bold text-slate-900">${escapeHtml(option.title)}</div>
          <div class="mt-1 text-xs text-slate-500">${escapeHtml(option.subtitle)}</div>
        </button>
      `).join('');

      const hubEl = appendAssistantHtml(`
        <div class="p-4">
          <div class="text-sm font-semibold text-slate-900">${escapeHtml(getHubIntroMessage())}</div>
          <div class="mt-3 grid gap-2">${optionsHtml}</div>
        </div>
      `);
      state.hubEl = hubEl;

      hubEl.querySelectorAll('[data-agent-key]').forEach((button) => {
        button.addEventListener('click', () => {
          selectAgent({
            agentKey: button.getAttribute('data-agent-key'),
            agentTitle: button.getAttribute('data-agent-title'),
            agentSubtitle: button.getAttribute('data-agent-subtitle')
          });
        });
      });
    }

    function selectAgent(selection) {
      state.agentKey = String(selection?.agentKey || '').trim();
      state.agentTitle = String(selection?.agentTitle || '').trim();
      state.agentSubtitle = String(selection?.agentSubtitle || '').trim();
      state.agentSelected = Boolean(state.agentKey);
      if (state.hubEl && state.hubEl.parentNode) {
        state.hubEl.parentNode.removeChild(state.hubEl);
      }
      state.hubEl = null;

      const presentation = getAgentPresentation();
      byId('chat-school-name').textContent = `${presentation.title} - ${state.schoolName}`;
      byId('chat-input').placeholder = presentation.subtitle;
      byId('chat-back-to-menu').classList.remove('hidden');
      appendMessage('assistant', presentation.greeting);
      byId('chat-input').focus();
    }

    function resetToHub() {
      state.agentKey = '';
      state.agentTitle = '';
      state.agentSubtitle = '';
      state.agentSelected = false;

      const presentation = getAgentPresentation();
      byId('chat-school-name').textContent = `${presentation.title} - ${state.schoolName}`;
      byId('chat-input').placeholder = presentation.subtitle;
      byId('chat-back-to-menu').classList.add('hidden');
      appendHubSelector();
      byId('chat-input').focus();
    }

    function appendMessage(role, text) {
      if (!String(text || '').trim()) return;
      const wrap = document.createElement('div');
      wrap.className = `message-bubble max-w-[88%] rounded-2xl px-4 py-3 text-sm shadow-sm ${
        role === 'user'
          ? 'ml-auto rounded-tr-md bg-slate-900 text-white'
          : role === 'human'
            ? 'rounded-tl-md bg-amber-50 text-slate-800 border border-amber-200'
            : 'rounded-tl-md bg-white text-slate-800 border border-slate-200'
      }`;
      wrap.textContent = text;
      byId('chat-messages').appendChild(wrap);
      byId('chat-messages').scrollTop = byId('chat-messages').scrollHeight;
    }

    function appendConversationMessage(message) {
      if (!message?.id || state.renderedMessageIds.has(message.id)) return;
      state.renderedMessageIds.add(message.id);
      appendMessage(message.role === 'human' ? 'human' : message.role, message.text || '');
    }

    function renderConversationTranscript(conversation) {
      state.renderedMessageIds = new Set();
      byId('chat-messages').innerHTML = '';
      (conversation?.transcript || []).forEach(appendConversationMessage);
    }

    function setAwaitingHuman(isAwaiting) {
      state.awaitingHuman = Boolean(isAwaiting);
      byId('chat-presence-text').textContent = state.awaitingHuman ? 'Atendimento automatizado em andamento' : 'Online agora';
    }

    function showTyping() {
      hideTyping();
      const wrap = document.createElement('div');
      wrap.id = 'chat-typing-indicator';
      wrap.className = 'message-bubble max-w-[88%] rounded-2xl rounded-tl-md border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700 shadow-sm';
      wrap.innerHTML = `
        <div class="text-xs font-semibold text-slate-500 mb-2">Escola digitando...</div>
        <div class="typing-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      `;
      byId('chat-messages').appendChild(wrap);
      byId('chat-messages').scrollTop = byId('chat-messages').scrollHeight;
      state.typingEl = wrap;
    }

    function hideTyping() {
      if (state.typingEl && state.typingEl.parentNode) {
        state.typingEl.parentNode.removeChild(state.typingEl);
      }
      state.typingEl = null;
    }

    function setSending(isSending) {
      byId('chat-send-btn').disabled = isSending;
      byId('chat-input').disabled = isSending;
      byId('chat-send-btn').textContent = isSending ? 'Enviando...' : 'Enviar';
    }

    async function ensureSession() {
      if (state.sessionId) return state.sessionId;
      const res = await fetch('/api/webchat/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          entrypoint: state.entrypoint
        })
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok || !body.session_id) {
        throw new Error(body?.error || 'Nao foi possivel iniciar o chat.');
      }
      state.sessionId = String(body.session_id || '');
      return state.sessionId;
    }

    async function sendMessage(text) {
      const sessionId = await ensureSession();
      const res = await fetch('/api/webchat/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          text,
          metadata: {
            school_name: state.schoolName,
            entrypoint: state.entrypoint,
            agent_key: state.agentKey,
            agent_title: state.agentTitle
          }
        })
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(body?.error || 'Falha ao enviar mensagem.');
      }
      setAwaitingHuman(Boolean(body?.metadata?.awaiting_human));
      return String(body.reply || '').trim() || 'Nao consegui responder no momento.';
    }

    async function loadConversation() {
      if (!state.sessionId) return null;

      const res = await fetch(`/api/webchat/conversations/${encodeURIComponent(state.sessionId)}`);
      const body = await res.json().catch(() => ({}));
      if (!res.ok || !body?.conversation) return null;

      const conversation = body.conversation;
      setAwaitingHuman(false);
      renderConversationTranscript(conversation);
      return conversation;
    }

    function startPollingConversation() {
      if (state.pollingTimer) return;
      state.pollingTimer = window.setInterval(() => {
        loadConversation().catch(() => {});
      }, 4000);
    }

    async function onSubmit(event) {
      event.preventDefault();
      const text = String(byId('chat-input').value || '').trim();
      if (!text) return;
      if (!state.agentSelected) {
        appendMessage('assistant', 'Escolha primeiro uma opcao do atendimento para eu direcionar voce ao setor correto.');
        if (!byId('chat-messages').querySelector('[data-agent-key]')) {
          appendHubSelector();
        }
        return;
      }

      byId('chat-input').value = '';
      setSending(true);
      if (!state.awaitingHuman) {
        showTyping();
      }

      try {
        const reply = await sendMessage(text);
        hideTyping();
        const conversation = await loadConversation();
        if (!conversation) {
          appendMessage('user', text);
          appendMessage('assistant', reply);
        }
      } catch (err) {
        hideTyping();
        appendMessage('assistant', err.message || 'Falha ao falar com a escola.');
      } finally {
        setSending(false);
        byId('chat-input').focus();
      }
    }

    function autoResize() {
      const input = byId('chat-input');
      input.style.height = 'auto';
      input.style.height = `${Math.min(input.scrollHeight, 128)}px`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const query = getQuery();
      state.schoolName = query.schoolName;
      state.entrypoint = query.entrypoint;
      state.agentKey = query.agentKey;
      state.agentTitle = query.agentTitle;
      state.agentSubtitle = query.agentSubtitle;
      state.agentSelected = Boolean(state.agentKey);

      const presentation = getAgentPresentation();
      byId('chat-school-name').textContent = `${presentation.title} - ${state.schoolName}`;
      byId('chat-presence-text').textContent = 'Online agora';
      byId('chat-messages').innerHTML = '';
      if (state.agentSelected) {
        appendMessage('assistant', presentation.greeting);
        byId('chat-back-to-menu').classList.remove('hidden');
      } else {
        appendHubSelector();
        byId('chat-back-to-menu').classList.add('hidden');
      }
      byId('chat-form').addEventListener('submit', onSubmit);
      byId('chat-input').addEventListener('input', autoResize);
      byId('chat-back-to-menu').addEventListener('click', resetToHub);
      byId('chat-input').placeholder = presentation.subtitle;
      byId('chat-input').focus();
      startPollingConversation();
    });
  </script>
</body>
</html>
